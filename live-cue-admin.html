<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live-CUE 管理后台</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
<style>
:root{--bg:#0a0c14;--surf:#0f1220;--elev:#171a2e;--gl:rgba(255,255,255,.04);--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);--acc:#3b82f6;--acl:#60a5fa;--ag:rgba(59,130,246,.35);--live:#ef4444;--up:#f59e0b;--ok:#10b981;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--r:8px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);-webkit-font-smoothing:antialiased}
/* ── LAYOUT ── */
#shell{display:flex;height:100vh}
/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.slogo{padding:20px 18px;border-bottom:1px solid var(--b1)}
.slogo-name{font-size:14px;font-weight:700;color:var(--t1)}
.slogo-sub{font-size:10px;color:var(--t3);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.snav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.snav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--t2);text-decoration:none;transition:all .15s;cursor:pointer}
.snav a:hover{background:var(--gl);color:var(--t1)}
.snav a.active{background:rgba(59,130,246,.12);color:var(--acl);border:1px solid rgba(59,130,246,.2)}
.snav a svg{flex-shrink:0;opacity:.7}
.snav .sep{height:1px;background:var(--b1);margin:8px 2px}
.suser{padding:14px 16px;border-top:1px solid var(--b1)}
.suser-email{font-size:11px;color:var(--t3);margin-bottom:8px;font-family:var(--mono)}
.suser-role{display:inline-block;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(59,130,246,.15);color:var(--acl);border:1px solid rgba(59,130,246,.25);margin-bottom:8px}
.btn-logout{width:100%;padding:7px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.btn-logout:hover{background:rgba(239,68,68,.2)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:52px;background:var(--surf);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--t1)}
.topbar-sub{font-size:12px;color:var(--t3);margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--b1) transparent}
/* ── CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surf);border:1px solid var(--b1);border-radius:var(--r);padding:16px;transition:border-color .15s}
.stat-card:hover{border-color:var(--b2)}
.sc-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.sc-num{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--t1);line-height:1}
.sc-sub{font-size:11px;color:var(--t3);margin-top:4px}
/* ── TABLE ── */
.section{background:var(--surf);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.sec-head{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--b1);gap:10px}
.sec-title{font-size:13px;font-weight:600;color:var(--t1)}
.sec-cnt{font-size:10px;font-family:var(--mono);color:var(--t3);background:var(--gl);padding:2px 8px;border-radius:99px;border:1px solid var(--b1)}
.sec-actions{margin-left:auto;display:flex;gap:8px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--b1);white-space:nowrap;background:rgba(255,255,255,.01)}
td{padding:10px 16px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gl)}
.mono{font-family:var(--mono);font-size:11px}
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.04em;white-space:nowrap}
.badge.live{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.badge.up{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.badge.done{background:rgba(71,85,105,.15);color:#94a3b8;border:1px solid rgba(71,85,105,.25)}
.badge.sched{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.badge.medal{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.live{background:#ef4444;box-shadow:0 0 4px #ef4444;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.6}}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;border:1px solid;font-family:var(--sans);white-space:nowrap}
.btn-primary{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:var(--acl)}
.btn-primary:hover{background:rgba(59,130,246,.25);border-color:rgba(59,130,246,.5);box-shadow:0 0 12px var(--ag)}
.btn-ghost{background:var(--gl);border-color:var(--b1);color:var(--t2)}
.btn-ghost:hover{background:var(--b1);color:var(--t1)}
.btn-danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:4px 10px;font-size:11px}
/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--elev);border:1px solid var(--b2);border-radius:12px;padding:24px;width:min(540px,95vw);max-height:90vh;overflow-y:auto;transform:translateY(10px);transition:transform .2s}
.modal-bg.show .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--surf);border:1px solid var(--b2);border-radius:6px;color:var(--t1);font-size:13px;font-family:var(--sans);transition:border-color .15s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.field input::placeholder,.field textarea::placeholder{color:var(--t3)}
.field select option{background:var(--elev)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--b1)}
/* ── LOGIN ── */
#loginPage{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--surf);border:1px solid var(--b1);border-radius:12px;padding:32px;width:360px}
.login-logo{font-size:24px;margin-bottom:4px}
.login-title{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:24px}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:12px;display:none}
.btn-block{width:100%;padding:10px;border-radius:6px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--acl);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--sans);margin-top:4px}
.btn-block:hover{background:rgba(59,130,246,.25);box-shadow:0 0 16px var(--ag)}
/* ── IMPORT ── */
.drop-zone{border:2px dashed var(--b2);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:var(--acc);background:rgba(59,130,246,.05)}
.drop-icon{font-size:36px;margin-bottom:12px}
.drop-txt{font-size:14px;color:var(--t2);margin-bottom:4px}
.drop-sub{font-size:11px;color:var(--t3)}
/* ── AUDIT ── */
.log-row{display:flex;gap:12px;padding:10px 16px;border-bottom:1px solid var(--b1);align-items:flex-start}
.log-row:last-child{border-bottom:none}
.log-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.log-icon.create{background:rgba(16,185,129,.15);color:#10b981}
.log-icon.update{background:rgba(59,130,246,.15);color:#60a5fa}
.log-icon.delete{background:rgba(239,68,68,.15);color:#f87171}
.log-icon.import{background:rgba(245,158,11,.15);color:#fbbf24}
.log-icon.login{background:rgba(139,92,246,.15);color:#a78bfa}
.log-body{flex:1;min-width:0}
.log-action{font-size:12px;font-weight:600;color:var(--t1)}
.log-meta{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--mono)}
/* ── LOADING ── */
.sk{background:linear-gradient(90deg,var(--gl) 25%,var(--b1) 50%,var(--gl) 75%);background-size:200% 100%;animation:sk 1.5s ease infinite;border-radius:4px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
/* ── RESPONSIVE ── */
@media(max-width:768px){.sidebar{display:none}.stat-grid{grid-template-columns:1fr 1fr}.field-row{grid-template-columns:1fr}}
/* ── SCHEDULE VIEW ── */
.sched-layout{display:flex;gap:16px;align-items:flex-start}
.sched-left{width:234px;flex-shrink:0;background:var(--surf);border:1px solid var(--b1);border-radius:var(--r);padding:8px;position:sticky;top:0;max-height:calc(100vh - 110px);overflow-y:auto}
.sched-left-hdr{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 10px;border-bottom:1px solid var(--b1);margin-bottom:8px}
.sched-right{flex:1;min-width:0}
.sv-venue{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:3px}
.sv-venue:hover{background:var(--gl);border-color:var(--b1)}
.sv-venue.sv-sel{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.28)}
.sv-vbar{width:4px;height:34px;border-radius:2px;background:var(--vc,#3b82f6);flex-shrink:0}
.sv-vinfo{flex:1;min-width:0}
.sv-vname{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sv-vmeta{font-size:10px;color:var(--t3);margin-top:2px}
.sv-vact{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.sv-venue:hover .sv-vact{opacity:1}
.ev-group{margin-bottom:22px}
.ev-group-hdr{display:flex;align-items:center;gap:8px;padding:6px 0 9px;border-bottom:2px solid var(--b1);margin-bottom:10px}
.ev-group-date{font-size:13px;font-weight:700;color:var(--acl)}
.ev-group-day{font-size:11px;color:var(--t3);background:var(--gl);padding:2px 8px;border-radius:99px;border:1px solid var(--b1)}
.ev-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:9px}
.ev-card{background:var(--surf);border:1px solid var(--b1);border-left:3px solid var(--vc,#3b82f6);border-radius:var(--r);padding:10px 12px;transition:all .15s;position:relative}
.ev-card:hover{border-color:var(--b2);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.ev-card-top{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.ev-card-time{font-size:11px;font-family:var(--mono);color:var(--t2);font-weight:600}
.ev-card-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px;line-height:1.4;min-height:16px}
.ev-card-bot{display:flex;align-items:center;gap:4px}
.ev-card-acts{margin-left:auto;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.ev-card:hover .ev-card-acts{opacity:1}
/* ── COURT LANES ── */
.ev-court-lane{margin-bottom:16px}
.ev-court-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ev-court-tag{font-size:10px;font-weight:700;padding:2px 11px;border-radius:4px;border:1px solid rgba(59,130,246,.28);background:rgba(59,130,246,.1);color:var(--vc,#3b82f6);flex-shrink:0;letter-spacing:.05em}
.ev-court-line{flex:1;height:1px;background:var(--b1)}
.ev-court-cards{display:flex;flex-wrap:wrap;gap:9px}
.ev-court-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(59,130,246,.1);color:var(--vc,#3b82f6);border:1px solid rgba(59,130,246,.2);white-space:nowrap;flex-shrink:0}
/* ── COURTS EDITOR ── */
.courts-editor{border:1px solid var(--b2);border-radius:6px;overflow:hidden;margin-top:4px}
.court-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--b1);background:var(--surf)}
.court-item:last-child{border-bottom:none}
.court-item input[type=text]{flex:1;padding:4px 8px;background:var(--gl);border:1px solid var(--b1);border-radius:4px;color:var(--t1);font-size:12px;font-family:var(--sans);outline:none}
.court-item input[type=text]:focus{border-color:var(--acc)}
.court-toggle{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.court-del{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 6px;font-size:14px;line-height:1;transition:color .15s;flex-shrink:0}
.court-del:hover{color:var(--red)}
.court-add-btn{width:100%;padding:8px;background:none;border:none;color:var(--acc);font-size:12px;cursor:pointer;font-family:var(--sans);text-align:center;transition:background .15s}
.court-add-btn:hover{background:var(--gl)}
.court-empty{padding:12px;text-align:center;font-size:11px;color:var(--t3)}
/* ── SEARCH ── */
.search-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid var(--b1)}
.search-input{flex:1;min-width:200px;padding:8px 14px;background:var(--gl);border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(59,130,246,.12)}
.search-select{padding:8px 10px;background:var(--gl);border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:12px;font-family:var(--sans);outline:none;cursor:pointer}
.search-select option{background:var(--elev)}
.search-results{padding:0}
.sr-empty{padding:32px;text-align:center;color:var(--t3);font-size:12px}
/* ── BULK ACTION BAR ── */
.bulk-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;background:rgba(59,130,246,.07);border-bottom:1px solid rgba(59,130,246,.18);animation:blin .15s ease;flex-wrap:wrap}
@keyframes blin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.bulk-cnt{font-size:12px;font-weight:700;color:var(--acl);flex-shrink:0}
.bulk-sep{width:1px;height:16px;background:var(--b2);flex-shrink:0}
/* checkbox reset */
input[type=checkbox].cb{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
/* extra filter row */
.filter-row{display:flex;gap:8px;align-items:center;padding:10px 20px;border-bottom:1px solid var(--b1);flex-wrap:wrap}
</style>
</head>
<body>

<!-- ═══════════════ LOGIN PAGE ═══════════════ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🏖️</div>
    <div class="login-title">Live-CUE 管理后台</div>
    <div class="login-sub">亚沙会智慧转播赛程管理系统</div>
    <div class="login-err" id="loginErr"></div>
    <div class="field">
      <label>邮箱</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-block" id="loginBtn" onclick="doLogin()">登 录</button>
    <p style="text-align:center;margin-top:14px;font-size:11px;color:var(--t3)">
      首次使用？请先在 Supabase Authentication 中创建账号
    </p>
  </div>
</div>

<!-- ═══════════════ MAIN SHELL ═══════════════ -->
<div id="shell" style="display:none">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="slogo">
      <div class="slogo-name">Live-CUE Admin</div>
      <div class="slogo-sub">亚沙会转播管理</div>
    </div>
    <nav class="snav" id="nav">
      <a onclick="show('dashboard')" class="active" data-p="dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>仪表盘
      </a>
      <a onclick="show('schedule')" data-p="schedule">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>赛程管理
      </a>
      <a onclick="show('events')" data-p="events">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>赛事列表
      </a>
      <a onclick="show('venues')" data-p="venues">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>场馆管理
      </a>
      <div class="sep"></div>
      <a onclick="show('import')" data-p="import">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>导入数据

let _dashSearchTimer=null;
async function dashSearch(){
  clearTimeout(_dashSearchTimer);
  _dashSearchTimer=setTimeout(async()=>{
    await loadVenueMap();
    const q=(document.getElementById('dashSQ')?.value||'').trim();
    const round=document.getElementById('dashSRound')?.value||'';
    const status=document.getElementById('dashSStatus')?.value||'';
    const hasFilter=q||round||status;
    if(!hasFilter){
      document.getElementById('dashSR').innerHTML='<div class="sr-empty">输入关键字开始搜索，可同时筛选赛次和状态</div>';
      document.getElementById('srCnt').textContent='—';return;
    }
    document.getElementById('dashSR').innerHTML='<div class="sr-empty">搜索中…</div>';
    let query=db.from('events').select('*').order('start_time').limit(100);
    if(q) query=query.or(`name.ilike.%${q}%,round.ilike.%${q}%`);
    if(round) query=query.eq('round',round);
    if(status) query=query.eq('status',status);
    const {data:res,error}=await query;
    if(error){document.getElementById('dashSR').innerHTML=`<div class="sr-empty">搜索出错：${error.message}</div>`;return;}
    const found=res||[];
    document.getElementById('srCnt').textContent=`${found.length} 条`;

/* ── VENUE LOCATION / COURTS JSON HELPERS ── */
function parseVenueLocJson(loc){
  if(!loc) return {loc:'',courts:[]};
  try{const j=JSON.parse(loc);if(j.loc!==undefined) return {loc:j.loc||'',courts:j.courts||[]};}catch(e){}
  return {loc:loc,courts:[]};
}
function buildVenueLocJson(locText,courts){
  const c=(courts||[]).filter(c=>c.n);
  if(!c.length) return locText||'';
  return JSON.stringify({loc:locText||'',courts:c});
}

/* ── COURT NOTES HELPERS ── */
// Court name is stored as "[场地:X] notes-text" prefix in the notes field
function parseCourtNotes(raw){
  if(!raw) return {court:'',notes:''};
  const m=(raw||'').match(/^\[场地:([^\]]*)\]\s*/);
  if(m) return {court:m[1].trim(), notes:raw.slice(m[0].length)};
  return {court:'', notes:raw};
}
function buildCourtNotes(court,notes){
  const c=(court||'').trim(), n=(notes||'').trim();
  if(c) return `[场地:${c}]${n?' '+n:''}`;
  return n||null;
}

/* ── COURT SELECT HELPER ── */
function updateCourtSelect(venueId, currentCourt){
  const venue=VENUES.find(v=>v.id===venueId);
  const {courts}=parseVenueLocJson(venue?.location||'');
  const sel=document.getElementById('evtCourtSel');
  const customDiv=document.getElementById('evtCourtCustom');
  if(!sel) return;
  if(courts.length>0){
    sel.innerHTML=`<option value="">不指定</option>`
      +courts.map(c=>`<option value="${c.n}">${c.n}${c.on===false?' (已隐藏)':''}</option>`).join('')
      +`<option value="__custom__">＋ 自定义…</option>`;
    const inList=courts.find(c=>c.n===currentCourt);
    if(currentCourt&&!inList){
      sel.value='__custom__';
      document.getElementById('evtCourt').value=currentCourt;
      customDiv.style.display='block';
    } else {
      sel.value=currentCourt||'';
      customDiv.style.display='none';
    }
  } else {
    sel.innerHTML=`<option value="">不指定</option><option value="__custom__">＋ 自定义…</option>`;
    if(currentCourt){sel.value='__custom__';document.getElementById('evtCourt').value=currentCourt;customDiv.style.display='block';}
    else{sel.value='';customDiv.style.display='none';}
  }
}
function getCourtFromModal(){

        ${ev.is_medal_event?'<span style="margin-left:auto;font-size:11px">🥇</span>':''}

      <div class="ev-card-name">${ev.name}</div>
      <div class="ev-card-bot">
        <span class="badge" style="font-size:9px;padding:1px 6px">${ev.round||'—'}</span>
        ${!hidevenue&&venue?`<span style="font-size:10px;color:${vc};font-weight:600;margin-left:2px;max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${venue.short_name||venue.name}</span>`:''}
        ${court&&hidevenue?`<span class="ev-court-badge" style="margin-left:auto">${court}</span>`:''}
        <div class="ev-card-acts">
          <button class="btn btn-ghost btn-sm" style="padding:2px 7px;font-size:10px" onclick='openEvtModal(JSON.parse(decodeURIComponent("${encodeURIComponent(JSON.stringify(ev))}")))'>✎</button>
          <button class="btn btn-danger btn-sm" style="padding:2px 7px;font-size:10px" onclick="if(confirm('删除该赛程？'))delSchedEvent('${ev.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }

  // ── Group by date ──
  const groups={};
  filtEvts.forEach(e=>{
    const d=new Date(e.start_time);
    const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    if(!groups[k])groups[k]=[];
    groups[k].push(e);
  });

  const evGridHtml=Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([date,evts])=>{
    const dt=new Date(date+'T00:00:00');
    const dateLabel=`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
    const dayLabel=`周${DAYS[dt.getDay()]}`;
    const sortedEvts=evts.slice().sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));

    let innerHtml;
    if(_schedVenueFilter){
      // ── Single venue: check if any event has a court set ──
      const hasCourts=sortedEvts.some(e=>parseCourtNotes(e.notes).court);
      const venue=VENUES.find(v=>v.id===_schedVenueFilter);
      const vc=venue?.color||'#3b82f6';
      if(hasCourts){
        // Group by court → show lanes
        const courtGroups={};
        sortedEvts.forEach(e=>{
          const {court}=parseCourtNotes(e.notes);
          const k=court||'__none__';
          if(!courtGroups[k])courtGroups[k]=[];
          courtGroups[k].push(e);
        });
        // Sort: named courts alphabetically, unnamed last
        const keys=Object.keys(courtGroups).sort((a,b)=>{
          if(a==='__none__') return 1;
          if(b==='__none__') return -1;
          return a.localeCompare(b,'zh');
        });
        innerHtml=keys.map(k=>{
          const label=k==='__none__'?'未指定场地':k;
          const cEvts=courtGroups[k];
          const cards=cEvts.map(ev=>buildEvCard(ev,vc,true)).join('');
          return `<div class="ev-court-lane" style="--vc:${vc}">
            <div class="ev-court-hdr">
              <span class="ev-court-tag">${label}</span>
              <div class="ev-court-line"></div>
              <span style="font-size:10px;color:var(--t3);flex-shrink:0">${cEvts.length}场</span>
            </div>
            <div class="ev-court-cards">${cards}</div>
          </div>`;
        }).join('');
      } else {
        // No courts — flat grid
        innerHtml=`<div class="ev-cards">${sortedEvts.map(ev=>buildEvCard(ev,vc,true)).join('')}</div>`;
      }
    } else {
      // ── All venues: group by venue, then by court within each venue ──
      const venueGroups={};
      sortedEvts.forEach(e=>{
        if(!venueGroups[e.venue_id]) venueGroups[e.venue_id]=[];
        venueGroups[e.venue_id].push(e);
      });
      // Keep venue order from VENUES array
      const orderedVids=VENUES.map(v=>v.id).filter(vid=>venueGroups[vid]);
      innerHtml=orderedVids.map(vid=>{
        const venue=VENUES.find(v=>v.id===vid);
        const vc=venue?.color||'#3b82f6';
        const vEvts=venueGroups[vid];
        const hasCourts=vEvts.some(e=>parseCourtNotes(e.notes).court);
        if(!hasCourts){
          // Single-court or no court: flat row with venue label
          return `<div class="ev-court-lane" style="--vc:${vc}">
            <div class="ev-court-hdr">
              <span class="ev-court-tag" style="background:${vc}18;border-color:${vc}44;color:${vc}">${venue?.name||vid}</span>
              <div class="ev-court-line"></div>
              <span style="font-size:10px;color:var(--t3);flex-shrink:0">${vEvts.length}场</span>
            </div>
            <div class="ev-court-cards">${vEvts.map(ev=>buildEvCard(ev,vc,true)).join('')}</div>
          </div>`;
        }
        // Multi-court: sub-lanes per court
        const courtGroups={};
        vEvts.forEach(e=>{
          const {court}=parseCourtNotes(e.notes);
          const k=court||'__none__';
          if(!courtGroups[k]) courtGroups[k]=[];
          courtGroups[k].push(e);
        });
        const keys=Object.keys(courtGroups).sort((a,b)=>{
          if(a==='__none__') return 1; if(b==='__none__') return -1;
          return a.localeCompare(b,'zh');
        });
        const lanesHtml=keys.map(k=>{
          const label=k==='__none__'?'其他场地':k;
          const cards=courtGroups[k].map(ev=>buildEvCard(ev,vc,true)).join('');
          return `<div class="ev-court-lane" style="--vc:${vc};margin-bottom:8px;padding-left:12px;border-left:2px solid ${vc}33">
            <div class="ev-court-hdr" style="margin-bottom:6px">
              <span class="ev-court-tag" style="font-size:9px;background:${vc}12;border-color:${vc}33;color:${vc}">${label}</span>
              <div class="ev-court-line"></div>
              <span style="font-size:10px;color:var(--t3);flex-shrink:0">${courtGroups[k].length}场</span>
            </div>
            <div class="ev-court-cards">${cards}</div>
          </div>`;
        }).join('');
        return `<div style="margin-bottom:14px">
          <div class="ev-court-hdr" style="margin-bottom:8px">
            <span class="ev-court-tag" style="background:${vc}18;border-color:${vc}44;color:${vc}">${venue?.name||vid}</span>
            <div class="ev-court-line"></div>
            <span style="font-size:10px;color:var(--t3);flex-shrink:0">${vEvts.length}场</span>
          </div>
          ${lanesHtml}
        </div>`;
      }).join('');
    }

    return `<div class="ev-group">
      <div class="ev-group-hdr">
        <span class="ev-group-date">${dateLabel}</span>
        <span class="ev-group-day">${dayLabel}</span>
        <span style="font-size:11px;color:var(--t3)">${evts.length} 场</span>
      </div>
      ${innerHtml}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="sched-layout">
      <div class="sched-left">
        <div class="sched-left-hdr">
          <span style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em">项目</span>
          <span style="font-size:10px;color:var(--t3)">${VENUES.length}个</span>
        </div>
        ${venueListHtml}
        ${_schedVenueFilter?`<button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:8px" onclick="filterSchedVenue(null)">× 显示全部</button>`:''}
      </div>
      <div class="sched-right">
        ${filtEvts.length===0
          ?'<div style="padding:60px;text-align:center;color:var(--t3)">暂无赛程，点击左侧项目旁的 ＋ 按钮添加</div>'
          :evGridHtml}
      </div>
    </div>`;
}

async function processSmartFile(file){
  await loadVenueMap();
  const st=document.getElementById('fileStatus');
  const ext=file.name.split('.').pop().toLowerCase();
  st.innerHTML=`<span style="color:var(--up)">⏳ 正在读取文件：${file.name}…</span>`;
  let rawText='';
  try{
    if(ext==='csv'){
      rawText=await file.text();
    } else if(['xlsx','xls'].includes(ext)){
      rawText=await readExcelAsText(file);
    } else if(ext==='docx'){
      rawText=await readDocxAsText(file);
    } else if(ext==='pdf'){
      rawText=await readPdfAsText(file);
    } else {
      st.innerHTML='<span style="color:#ef4444">不支持的文件格式</span>';return;
    }
    st.innerHTML=`<span style="color:var(--ok)">✓ 文件读取成功（${rawText.length} 字符）</span> — <span style="color:var(--up)">⏳ AI 分析中…</span>`;
    await analyzeWithClaude(rawText, file.name);
  } catch(e){
    st.innerHTML=`<span style="color:#ef4444">错误：${e.message}</span>`;
  }
}

async function readExcelAsText(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  let text='';
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn];
    text+=`\n=== 工作表：${sn} ===\n`;
    text+=XLSX.utils.sheet_to_csv(ws,{blankrows:false});
  });
  return text;
}

async function readDocxAsText(file){
  const buf=await file.arrayBuffer();
  const result=await mammoth.extractRawText({arrayBuffer:buf});
  return result.value;
}

async function readPdfAsText(file){
  // Use PDF.js from CDN dynamically
  if(!window.pdfjsLib){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
      s.type='module'; s.onload=res; s.onerror=rej;
      document.head.appendChild(s);
    }).catch(()=>{});
    // Fallback: use simpler build
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
        s.onload=()=>{
          window.pdfjsLib=window['pdfjs-dist/build/pdf'];
          pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
          res();
        };s.onerror=rej;document.head.appendChild(s);
      });
    }
  }
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    text+=tc.items.map(x=>x.str).join(' ')+'\n';
  }
  return text;
}

let _aiParsedEvents=[];

async function analyzeWithClaude(rawText, fileName){
  const apiKey=localStorage.getItem('claude_api_key')||'';
  if(!apiKey){
    document.getElementById('fileStatus').innerHTML='<span style="color:#ef4444">请先填写并保存 Claude API Key</span>';return;
  }
  await loadVenueMap();
  const venueList=VENUES.map(v=>`${v.id}|${v.short_name||v.name}`).join('\n');

  const prompt=`你是一个体育赛程数据提取专家。从以下文件内容中提取所有比赛单元日程。

当前可用场馆（id|名称）：
${venueList}

文件内容：
${rawText.slice(0,12000)}

请提取所有比赛单元，返回严格的 JSON 数组，每条记录包含：
{
  "name": "赛事名称（中英文）",
  "venue_id": "从上方场馆列表中匹配最合适的venue_id，如无法匹配填null",
  "round": "赛次（如：半决赛/决赛/小组赛等）",
  "start_time": "开始时间，格式2026-MM-DDTHH:mm:ss+08:00",
  "end_time": "结束时间，格式2026-MM-DDTHH:mm:ss+08:00（如无则start+1小时）",
  "is_medal_event": true/false
}

只返回 JSON 数组，不要其他文字。如果无法解析出任何赛事，返回空数组 []。`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:4096,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||`API错误 ${resp.status}`);}
    const data=await resp.json();
    const txt=data.content[0].text.trim();
    const jsonMatch=txt.match(/\[[\s\S]*\]/);
    if(!jsonMatch) throw new Error('AI 返回内容无法解析为 JSON');
    _aiParsedEvents=JSON.parse(jsonMatch[0]);
    document.getElementById('fileStatus').innerHTML=`<span style="color:var(--ok)">✓ AI 解析完成，发现 ${_aiParsedEvents.length} 条赛事</span>`;
    renderAiResult(_aiParsedEvents, fileName);
    await logAction('import','events',`AI解析文件 [${fileName}] 发现 ${_aiParsedEvents.length} 条赛事`);
  } catch(e){
    document.getElementById('fileStatus').innerHTML=`<span style="color:#ef4444">AI分析失败：${e.message}</span>`;
  }
}

let _diffResult=null; // {newEvts, modEvts, dupEvts, badEvts}

async function renderAiResult(parsedEvents, fileName){
  // Load latest DB state for comparison
  await loadVenueMap();
  const {data:dbEvts}=await db.from('events').select('*');
  const dbAll=dbEvts||[];

  const fmtT=ts=>ts?new Date(ts).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}):'?';

  // Categorise each parsed event
  const newEvts=[],modEvts=[],dupEvts=[],badEvts=[];
  parsedEvents.forEach(pe=>{
    if(!pe.venue_id){badEvts.push({...pe,_reason:'未匹配场馆'});return;}
    const st=pe.start_time?new Date(pe.start_time).getTime():null;
    const et=pe.end_time?new Date(pe.end_time).getTime():null;
    // Find a matching DB event: same name + venue + round (fuzzy time ±60min)
    const match=dbAll.find(de=>
      (de.name||'').trim()===(pe.name||'').trim() &&
      de.venue_id===pe.venue_id &&
      de.round===pe.round &&
      st && Math.abs((de.start_time||0)-st)<3600000
    );
    if(!match){
      newEvts.push({...pe,_st:st,_et:et});
    } else {
      // Check if anything changed
      const changed=[];
      if(st&&Math.abs((match.start_time||0)-st)>60000) changed.push({f:'开始时间',old:fmtT(match.start_time),nw:fmtT(st)});
      if(et&&Math.abs((match.end_time||0)-et)>60000) changed.push({f:'结束时间',old:fmtT(match.end_time),nw:fmtT(et)});
      if(pe.round&&match.round!==pe.round) changed.push({f:'赛次',old:match.round,nw:pe.round});
      if(typeof pe.is_medal_event==='boolean'&&match.is_medal_event!==pe.is_medal_event) changed.push({f:'金牌',old:match.is_medal_event?'是':'否',nw:pe.is_medal_event?'是':'否'});
      if(changed.length) modEvts.push({...pe,_st:st,_et:et,_dbId:match.id,_changes:changed});
      else dupEvts.push({...pe,_dbId:match.id});
    }
  });
  _diffResult={newEvts,modEvts,dupEvts,badEvts};

  // Build the diff UI
  const sec=document.getElementById('aiResultSection');
  sec.style.display='';
  document.getElementById('aiResultCnt').textContent=`${parsedEvents.length} 条 · 🆕${newEvts.length} ✏️${modEvts.length} ✓${dupEvts.length} ⚠️${badEvts.length}`;

  function diffTable(rows,type){
    if(!rows.length) return `<div style="padding:16px 20px;color:var(--t3);font-size:12px">无</div>`;
    const hdrCls=type==='new'?'color:#10b981':type==='mod'?'color:#f59e0b':type==='dup'?'color:var(--t3)':'color:#ef4444';
    return `<div class="table-wrap"><table style="font-size:11px">
      <tr>
        ${type!=='dup'?`<th style="width:28px"><input type="checkbox" class="cb diff-sa" data-type="${type}" onclick="diffSelAll(this,'${type}')" checked></th>`:'<th style="width:28px;color:var(--t3)">—</th>'}
        <th>赛事名称</th><th>场馆</th><th>赛次</th><th>开始</th><th>结束</th>
        ${type==='mod'?'<th>变更内容</th>':''}
        ${type==='bad'?'<th>原因</th>':''}
      </tr>
      ${rows.map((e,i)=>{
        const v=VENUES.find(x=>x.id===e.venue_id);
        const st=fmtT(e._st||e.start_time);
        const et=fmtT(e._et||e.end_time);
        const chk=type!=='dup'?`<td><input type="checkbox" class="cb diff-cb diff-${type}" data-idx="${i}" checked></td>`:'<td style="color:var(--t3)">✓</td>';
        const changes=type==='mod'?`<td style="max-width:180px">${(e._changes||[]).map(c=>`<span style="color:#f59e0b;font-size:10px">${c.f}: <del style="opacity:.5">${c.old}</del>→${c.nw}</span>`).join('<br>')}</td>`:'';
        const reason=type==='bad'?`<td style="color:#ef4444;font-size:10px">${e._reason||'—'}</td>`:'';
        return `<tr style="${type==='dup'?'opacity:.45':''}">
          ${chk}
          <td style="color:var(--t1)">${e.name||'—'}</td>
          <td>${v?`<span style="color:var(--acl)">${v.short_name||v.name}</span>`:'<span style="color:#ef4444">?</span>'}</td>
          <td><span class="badge" style="font-size:9px">${e.round||'—'}</span></td>
          <td class="mono">${st}</td><td class="mono">${et}</td>
          ${changes}${reason}
        </tr>`;
      }).join('')}
    </table></div>`;

// Fuzzy column matching — maps any reasonable header variation to our field names
function fuzzyMatchColumn(header){
  const h=header.toLowerCase().trim();
  if(/名称|赛事名|event.*name|name.*event|项目名|比赛名/.test(h)) return 'name';
  if(/场馆|venue|地点|赛场/.test(h)) return 'venue';
  if(/赛次|轮次|round|阶段|比赛轮/.test(h)) return 'round';
  if(/开始.*时间|start.*time|start|开始|起始/.test(h)) return 'start_time';
  if(/结束.*时间|end.*time|finish.*time|end|结束|终止/.test(h)) return 'end_time';
  if(/频道|channel|播出|转播/.test(h)) return 'broadcast_channel';
  if(/金牌|medal|is.*medal|奖牌/.test(h)) return 'is_medal_event';
  if(/状态|status/.test(h)) return 'status';
  if(/备注|note|remark|说明/.test(h)) return 'notes';
  return null;
}

// Parse a date/time string into timestamp — handles many formats
function parseDateTime(str){
  if(!str||!str.trim()) return null;
  str=str.trim().replace(/[年月]/g,'-').replace(/[日号]/g,'').replace(/\s+/g,' ');
  const d=new Date(str);
  if(!isNaN(d.getTime())) return d.getTime();
  // Try common Chinese formats: 2025-11-06 09:00
  const m=str.match(/(\d{4})[^\d](\d{1,2})[^\d](\d{1,2})[\sT](\d{1,2}):(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5]).getTime();
  // Date only — assume midnight
  const d2=str.match(/(\d{4})[^\d](\d{1,2})[^\d](\d{1,2})/);
  if(d2) return new Date(+d2[1],+d2[2]-1,+d2[3]).getTime();
  return null;
}

// Fuzzy venue matching — find best venue by substring/similarity
function fuzzyMatchVenue(val,venues){
  if(!val) return null;
  const v=val.trim();
  // Exact match
  let match=venues.find(vn=>vn.name===v||vn.short_name===v);
  if(match) return match.id;
  // Contains match
  match=venues.find(vn=>vn.name.includes(v)||v.includes(vn.name)||(vn.short_name&&(vn.short_name.includes(v)||v.includes(vn.short_name))));
  if(match) return match.id;
  // Token overlap
  const tokens=v.replace(/[赛场馆中心]/g,' ').split(/\s+/).filter(t=>t.length>1);
  let best=null,bestScore=0;
  venues.forEach(vn=>{
    const score=tokens.filter(t=>vn.name.includes(t)||(vn.short_name&&vn.short_name.includes(t))).length;
    if(score>bestScore){bestScore=score;best=vn;}
  });
  return bestScore>0?best.id:null;
}

let _importRows=[], _importMapping={};

function processCSV(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    await loadVenueMap();
    // Parse CSV (handle quoted fields)
    const text=e.target.result;
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length){alert('文件为空');return;}

    // Simple CSV parser (handles quoted commas)
    function parseRow(line){
      const result=[],re=/("(?:[^"]|"")*"|[^,]*),?/g;
      let m;while((m=re.exec(line))!==null&&m[0].length){
        let v=m[1];if(v.startsWith('"')&&v.endsWith('"'))v=v.slice(1,-1).replace(/""/g,'"');
        result.push(v.trim());
      }
      return result;
    }

    const headers=parseRow(lines[0]);
    const mapping={};
    headers.forEach((h,i)=>{const f=fuzzyMatchColumn(h);if(f)mapping[i]=f;});

    // Parse all data rows
    _importRows=lines.slice(1).filter(l=>l.trim()).map(l=>parseRow(l));
    _importMapping=mapping;

    // Map rows to event records for preview
    const mapped=_importRows.slice(0,5).map(row=>{
      const rec={};
      Object.entries(mapping).forEach(([i,field])=>rec[field]=row[+i]||'');
      return rec;
    });

    // Field labels
    const labels={name:'赛事名称',venue:'场馆',round:'赛次',start_time:'开始时间',end_time:'结束时间',broadcast_channel:'频道',is_medal_event:'金牌',status:'状态',notes:'备注'};
    const mappedFields=Object.values(mapping);
    const missingRequired=['name','venue','start_time','end_time'].filter(f=>!mappedFields.includes(f));

    // Column mapping display
    const mapDisplay=headers.map((h,i)=>{
      const f=mapping[i];
      return `<tr><td style="color:var(--t1)">${h}</td><td style="color:${f?'#10b981':'var(--t3)'}">→ ${f?labels[f]||f:'（忽略）'}</td></tr>`;
    }).join('');

    // Preview table
    const previewHeaders=Object.values(mapping).map(f=>labels[f]||f);
    const previewRows=mapped.map(rec=>`<tr>${Object.values(mapping).map((f,_i)=>`<td style="font-size:11px">${rec[f]||''}</td>`).join('')}</tr>`).join('');

    document.getElementById('importPreview').innerHTML=`
      <div style="background:var(--gl);border:1px solid var(--b1);border-radius:8px;padding:16px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px">📐 智能列映射</div>
        <div class="table-wrap"><table><tr><th>原始列名</th><th>映射字段</th></tr>${mapDisplay}</table></div>
        ${missingRequired.length?`<div style="margin-top:10px;color:#f87171;font-size:11px">⚠️ 缺少必要字段: ${missingRequired.map(f=>labels[f]).join('、')}</div>`:'<div style="margin-top:10px;color:#10b981;font-size:11px">✓ 必要字段已识别</div>'}
      </div>
      <div style="background:var(--gl);border:1px solid var(--b1);border-radius:8px;padding:16px">
        <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px">预览（前5行）</div>
        <div class="table-wrap"><table>
          <tr>${previewHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>${previewRows}
        </table></div>
        <div style="margin-top:10px;font-size:12px;color:var(--t3)">共 ${_importRows.length} 行数据</div>
        ${missingRequired.length?'':
          `<div style="margin-top:14px;display:flex;gap:10px;align-items:center">
            <button class="btn btn-primary" onclick="doImport()">✓ 确认导入 ${_importRows.length} 条数据</button>
            <span style="font-size:11px;color:var(--t3)">场馆名称将自动模糊匹配</span>
          </div>`
        }
      </div>`;
  };
  reader.readAsText(file,'UTF-8');
}

async function doImport(){
  await loadVenueMap();
  const btn=document.querySelector('#importPreview .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='导入中…';}

  const mapping=_importMapping;
  const rows=_importRows;
  const labels={name:'赛事名称',venue:'场馆',round:'赛次',start_time:'开始时间',end_time:'结束时间'};

  let ok=0,fail=0,failDetails=[];
  const batchSize=50;
  const payloads=[];

  rows.forEach((row,idx)=>{
    const rec={};
    Object.entries(mapping).forEach(([i,field])=>rec[field]=row[+i]||'');
    const name=rec.name?.trim();
    if(!name){fail++;failDetails.push(`行${idx+2}: 缺少名称`);return;}
    const st=parseDateTime(rec.start_time);
    const et=parseDateTime(rec.end_time);
    if(!st){fail++;failDetails.push(`行${idx+2}: 无法解析开始时间 "${rec.start_time}"`);return;}
    if(!et){fail++;failDetails.push(`行${idx+2}: 无法解析结束时间 "${rec.end_time}"`);return;}
    const venueId=fuzzyMatchVenue(rec.venue,VENUES);
    if(!venueId){fail++;failDetails.push(`行${idx+2}: 未找到场馆 "${rec.venue}"`);return;}
    const payload={
      name,venue_id:venueId,
      round:rec.round||'其他',
      start_time:st,end_time:et,
      broadcast_channel:rec.broadcast_channel||null,
      status:rec.status||'scheduled',
      is_medal_event:['true','1','是','yes'].includes((rec.is_medal_event||'').toLowerCase()),
      notes:rec.notes||null,
    };
    payloads.push(payload);
  });

  // Insert in batches
  for(let i=0;i<payloads.length;i+=batchSize){
    const batch=payloads.slice(i,i+batchSize);
    const {error}=await db.from('events').insert(batch);
    if(error){fail+=batch.length;failDetails.push('批量插入失败: '+error.message);}
    else ok+=batch.length;
  }

  // Log to import_history
  await db.from('import_history').insert({file_name:'CSV导入',total_rows:rows.length,success_rows:ok,failed_rows:fail,status:fail===0?'completed':'completed'}).catch(()=>{});
  await logAction('import','events',`导入 ${ok} 条赛事`);

  const msg=fail>0
    ?`✓ 成功导入 ${ok} 条，失败 ${fail} 条\n${failDetails.slice(0,5).join('\n')}`
    :`✓ 全部 ${ok} 条数据导入成功！`;
  alert(msg);
  _importRows=[];_importMapping={};
  await renderImport();
}

/* ── GANTT HELPERS ── */
function adminGetLanes(venue, vEvts){
  if(!vEvts.length) return [];
  const {courts:defined}=parseVenueLocJson(venue.location||'');
  const active=defined.filter(c=>c.on!==false);
  if(active.length>0){
    const lanes=active.map(c=>({label:c.n,evts:vEvts.filter(e=>parseCourtNotes(e.notes).court===c.n)}));
    const tagged=new Set(vEvts.filter(e=>parseCourtNotes(e.notes).court).map(e=>e.id));
    const untagged=vEvts.filter(e=>!tagged.has(e.id));
    if(untagged.length) lanes.push({label:'其他',evts:untagged});
    return lanes.filter(ln=>ln.evts.length>0);
  }
  const sorted=vEvts.slice().sort((a,b)=>a.start_time-b.start_time);
  const lanes=[];
  sorted.forEach(ev=>{
    let placed=false;
    for(let i=0;i<lanes.length;i++){
      if(!lanes[i].evts.some(le=>ev.start_time<le.end_time&&ev.end_time>le.start_time)){lanes[i].evts.push(ev);placed=true;break;}
    }
    if(!placed) lanes.push({label:'',evts:[ev]});
  });
  if(lanes.length>1) lanes.forEach((ln,i)=>{ln.label=`场地${i+1}`;});
  return lanes;
}

function buildGanttDay(date, dayEvts, isT, pxPerHr, rowH, leftW, forPrint){
  const DAYS='日一二三四五六';
  const dt=new Date(date+'T00:00:00');
  const dateStr=`${dt.getMonth()+1}月${dt.getDate()}日 周${DAYS[dt.getDay()]}`;
  // Time range: round down to nearest 30min before first event, up to 30min after last
  const minMs=Math.min(...dayEvts.map(e=>e.start_time));
  const maxMs=Math.max(...dayEvts.map(e=>e.end_time));
  const dayMs=dt.getTime();
  const startMin=Math.floor((minMs-dayMs)/60000/30)*30-30;
  const endMin=Math.ceil((maxMs-dayMs)/60000/30)*30+30;
  const totalMin=endMin-startMin;
  const totalPx=totalMin/60*pxPerHr;
  const msPerPx=60000*60/pxPerHr;

  // Time axis
  let axisTicks='';
  for(let m=Math.ceil(startMin/60)*60;m<=endMin;m+=60){
    const x=(m-startMin)/60*pxPerHr;
    const hh=Math.floor((m+1440)%1440/60);
    axisTicks+=`<div style="position:absolute;left:${x}px;top:0;height:100%;border-left:1px solid ${forPrint?'#d1d5db':'rgba(255,255,255,.08)'};pointer-events:none">
      <span style="position:absolute;top:2px;left:3px;font-size:9px;color:${forPrint?'#6b7280':'rgba(255,255,255,.35)'};white-space:nowrap;font-family:monospace">${p2(hh)}:00</span>
    </div>`;
  }
  // 30-min minor ticks
  for(let m=Math.ceil(startMin/30)*30;m<=endMin;m+=30){
    if(m%60===0) continue;
    const x=(m-startMin)/60*pxPerHr;
    axisTicks+=`<div style="position:absolute;left:${x}px;top:0;height:100%;border-left:1px dashed ${forPrint?'#e5e7eb':'rgba(255,255,255,.03)'};pointer-events:none"></div>`;
  }

  // Build rows per venue
  let rowsHtml='';
  let rowCount=0;
  VENUES.forEach(venue=>{
    const vEvts=dayEvts.filter(e=>e.venue_id===venue.id);
    if(!vEvts.length) return;
    const lanes=adminGetLanes(venue,vEvts);
    lanes.forEach((lane,li)=>{
      const isFirst=li===0;
      const bg=forPrint?(rowCount%2===0?'#f8fafc':'#ffffff'):(rowCount%2===0?'rgba(255,255,255,.025)':'rgba(255,255,255,.012)');
      // Left label cell
      const labelHtml=isFirst
        ?`<div style="font-size:11px;font-weight:700;color:${forPrint?'#0f172a':'#f1f5f9'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${venue.short_name||venue.name}</div>
           ${lane.label?`<div style="font-size:9px;font-weight:700;color:${venue.color};margin-top:1px">${lane.label}</div>`:`<div style="font-size:9px;color:${forPrint?'#94a3b8':'rgba(255,255,255,.3)'};">${venue.name}</div>`}`
        :`<div style="padding-left:10px;font-size:10px;font-weight:700;color:${venue.color}">${lane.label||'—'}</div>`;
      // Event blocks
      let blocks='';
      lane.evts.forEach(ev=>{
        const x=(ev.start_time-dayMs-startMin*60000)/(msPerPx);
        const w=Math.max((ev.end_time-ev.start_time)/(msPerPx), 4);
        const stStr=`${p2(new Date(ev.start_time).getHours())}:${p2(new Date(ev.start_time).getMinutes())}`;
        const enStr=`${p2(new Date(ev.end_time).getHours())}:${p2(new Date(ev.end_time).getMinutes())}`;
        const team=isTeamEvent(ev);
        const cueMin=team?-10:-5;
        const cueX=x+(cueMin*60000)/(msPerPx);
        const cueMarker=isT?`<div style="position:absolute;left:${cueX}px;top:0;bottom:0;width:2px;background:#ef4444;z-index:2" title="提示 ${stStr} (${cueMin}min)"></div>`:'';
        const opacity=forPrint?0.88:0.75;
        blocks+=`${cueMarker}<div style="position:absolute;left:${x}px;width:${w}px;top:5px;bottom:5px;
          background:${venue.color};opacity:${opacity};border-radius:3px;overflow:hidden;
          display:flex;align-items:center;padding:0 5px;box-sizing:border-box;z-index:1"
          title="${ev.name} ${stStr}–${enStr}${lane.label?' ['+lane.label+']':''}">
          <span style="font-size:9px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,.4)">
            ${ev.is_medal_event?'🥇':''}${ev.name}${isT?` <span style="opacity:.8;font-size:8px">${cueMin}m</span>`:''}
          </span>
        </div>`;
      });
      rowsHtml+=`<div style="display:flex;height:${rowH}px;border-bottom:1px solid ${forPrint?'#e5e7eb':'rgba(255,255,255,.06)'}">
        <div style="width:${leftW}px;flex-shrink:0;padding:4px 8px;border-right:1px solid ${forPrint?'#e2e8f0':'rgba(255,255,255,.08)'};
          border-left:3px solid ${venue.color};display:flex;flex-direction:column;justify-content:center;background:${bg}">
          ${labelHtml}
        </div>
        <div style="flex:1;position:relative;overflow:hidden;background:${bg}">
          ${axisTicks}${blocks}
        </div>
      </div>`;
      rowCount++;
    });
  });
  const hdrBg=forPrint?'#1e3a5f':'rgba(59,130,246,.15)';
  const hdrColor=forPrint?'#fff':'var(--acl)';
  return `<div style="margin-bottom:${forPrint?'32':'16'}px;border:1px solid ${forPrint?'#cbd5e1':'rgba(255,255,255,.08)'};border-radius:6px;overflow:hidden">
    <div style="display:flex;align-items:center;gap:10px;padding:7px 14px;background:${hdrBg}">
      <span style="font-size:13px;font-weight:700;color:${hdrColor}">${dateStr}</span>
      <span style="font-size:10px;color:${forPrint?'rgba(255,255,255,.7)':'var(--t3)'}">${dayEvts.length} 场</span>
      ${isT?`<span style="font-size:10px;color:#ef4444;margin-left:4px">● 红线 = 传送提示时间</span>`:''}
    </div>
    <div style="overflow-x:auto">
      <div style="min-width:${leftW+totalPx}px">${rowsHtml}</div>
    </div>
  </div>`;
}

function updateExportPreview(){
  const rtype=window._exportRtype||'schedule';
  const isT=(rtype==='transmission');
  const dateFilter=document.getElementById('exp-date')?.value||'all';
  let events=(window._allEventsExport||[]).slice();
  if(dateFilter!=='all') events=events.filter(e=>{const d=new Date(e.start_time);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`===dateFilter;});
  document.getElementById('preview-title').textContent=`预览 — ${isT?'传送表':'赛程表'} (甘特图)`;
  document.getElementById('preview-cnt').textContent=`${events.length} 条`;
  const groups={};
  events.forEach(e=>{const d=new Date(e.start_time);const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;if(!groups[k])groups[k]=[];groups[k].push(e);});
  let html='';
  Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,evts])=>{
    html+=buildGanttDay(date,evts,isT,60,44,160,false);
  });
  if(!html) html='<div style="padding:40px;text-align:center;color:var(--t3)">暂无数据</div>';
  document.getElementById('preview-body').innerHTML=`<div style="padding:16px">${html}</div>`;
}

async function doExport(){
  await loadVenueMap();
  const rtype=window._exportRtype||'schedule';
  const fmt=window._exportFmt||'excel';
  const dateFilter=document.getElementById('exp-date')?.value||'all';
  let events=(window._allEventsExport||[]).slice();
  if(dateFilter!=='all') events=events.filter(e=>{const d=new Date(e.start_time);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`===dateFilter;});
  const now=new Date();
  const nowStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${p2(now.getHours())}:${p2(now.getMinutes())}`;
  const rtypeLabel=rtype==='schedule'?'赛程表':'传送表';
  const dateLabel=dateFilter==='all'?'全赛程':(()=>{const dt=new Date(dateFilter+'T00:00:00');return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;})();
  const fileName=`第六届亚洲沙滩运动会_${rtypeLabel}_${dateLabel}`;

  else exportAsPdf(events,rtype,fileName,nowStr,dateLabel);
}

function exportAsExcel(events,rtype,fileName,nowStr,dateLabel){
  if(typeof XLSX==='undefined'){alert('Excel库未加载，请刷新页面重试');return;}
  const WB=XLSX.utils.book_new();
  const isT=(rtype==='transmission');
  const groups={};
  events.forEach(e=>{const d=new Date(e.start_time);const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;if(!groups[k])groups[k]=[];groups[k].push(e);});
  const dateKeys=Object.keys(groups);
  dateKeys.forEach((date,pageIdx)=>{
    const evts=groups[date];
    const dt=new Date(date+'T00:00:00');
    const sheetName=`${dt.getMonth()+1}月${dt.getDate()}日`;
    const rows=[];
    rows.push(['第六届亚洲沙滩运动会 The 6th Asian Beach Games · Sanya 2025','','','','','','','','']);
    rows.push([isT?'传 送 表':'赛 程 表',`日期：${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`,'',`共 ${evts.length} 场`,'',`第 ${pageIdx+1} 页 / 共 ${dateKeys.length} 页`,'',`导出时间：${nowStr}`,'']);
    rows.push([]);
    if(isT) rows.push(['提示时间','提前量','赛事名称','场馆','赛次','开始时间','结束时间','时长(分钟)','类型']);
    else rows.push(['序号','赛事名称','场馆','赛次','开始时间','结束时间','时长(分钟)','状态','备注']);
    evts.forEach((ev,i)=>{
      const st=new Date(ev.start_time),en=new Date(ev.end_time);
      const fmtT=t=>`${p2(t.getHours())}:${p2(t.getMinutes())}`;
      const dur=Math.round((en-st)/60000);
      const venue=VENUES.find(v=>v.id===ev.venue_id);
      const team=isTeamEvent(ev);
      const cueMin=team?-10:-5;
      const cueT=new Date(st.getTime()+cueMin*60000);
      const statusMap={live:'直播中',scheduled:'计划中',finished:'已完成',completed:'已完成',cancelled:'已取消'};
      if(isT) rows.push([fmtT(cueT),`${cueMin}分钟`,ev.name,venue?.short_name||venue?.name||'—',ev.round||'—',fmtT(st),fmtT(en),dur,team?'团体':'个人']);
      else rows.push([i+1,ev.name,venue?.short_name||venue?.name||'—',ev.round||'—',fmtT(st),fmtT(en),dur,statusMap[ev.status]||ev.status||'—',ev.notes||'']);
    });
    rows.push([]);
    rows.push(['第六届亚洲沙滩运动会 · Live-CUE 赛程管理系统','','','','','','','','']);
    const WS=XLSX.utils.aoa_to_sheet(rows);
    WS['!cols']=isT?[{wch:9},{wch:8},{wch:32},{wch:16},{wch:14},{wch:9},{wch:9},{wch:10},{wch:7}]:[{wch:6},{wch:32},{wch:16},{wch:14},{wch:9},{wch:9},{wch:10},{wch:9},{wch:18}];
    XLSX.utils.book_append_sheet(WB,WS,sheetName);
  });
  // Summary sheet
  const sRows=[['第六届亚洲沙滩运动会','','',''],
    [isT?'传送表':'赛程表','汇总统计','',`导出时间：${nowStr}`],
    [],['日期','赛事总数','团体','个人']];
  dateKeys.forEach(date=>{
    const dt=new Date(date+'T00:00:00');
    const evts=groups[date];
    const tc=evts.filter(e=>isTeamEvent(e)).length;
    sRows.push([`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`,evts.length,tc,evts.length-tc]);
  });
  sRows.push([]);
  const tc=events.filter(e=>isTeamEvent(e)).length;
  sRows.push(['合计',events.length,tc,events.length-tc]);
  const SWS=XLSX.utils.aoa_to_sheet(sRows);
  SWS['!cols']=[{wch:22},{wch:10},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(WB,SWS,'汇总');
  XLSX.writeFile(WB,`${fileName}.xlsx`);
}

function exportAsPdf(events,rtype,fileName,nowStr,dateLabel){
  const isT=(rtype==='transmission');
  const groups={};
  events.forEach(e=>{const d=new Date(e.start_time);const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;if(!groups[k])groups[k]=[];groups[k].push(e);});
  const dateKeys=Object.keys(groups).sort();
  // Inline VENUES for the popup window
  const venuesJson=JSON.stringify(VENUES.map(v=>({id:v.id,name:v.name,short_name:v.short_name,color:v.color,location:v.location||''})));
  // Build gantt pages - each day is a page
  const pagesHtml=dateKeys.map((date,pageIdx)=>{
    const evts=groups[date];
    const dt=new Date(date+'T00:00:00');
    const dateStr=`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
    const DAYS='日一二三四五六';
    const minMs=Math.min(...evts.map(e=>e.start_time));
    const maxMs=Math.max(...evts.map(e=>e.end_time));
    const dayMs=dt.getTime();
    const startMin=Math.floor((minMs-dayMs)/60000/30)*30-30;
    const endMin=Math.ceil((maxMs-dayMs)/60000/30)*30+30;
    const totalMin=endMin-startMin;
    const pxPerHr=68, rowH=40, leftW=155;
    const totalPx=totalMin/60*pxPerHr;
    // time axis ticks for print
    let axisTicks='';
    for(let m=Math.ceil(startMin/60)*60;m<=endMin;m+=60){
      const x=(m-startMin)/60*pxPerHr;
      const hh=Math.floor((m+1440)%1440/60);
      axisTicks+=`<div class="tick" style="left:${x}px"><span class="tl">${p2(hh)}:00</span></div>`;
    }
    for(let m=Math.ceil(startMin/30)*30;m<=endMin;m+=30){
      if(m%60===0) continue;
      const x=(m-startMin)/60*pxPerHr;
      axisTicks+=`<div class="tick-m" style="left:${x}px"></div>`;
    }
    // rows
    let rowsHtml='';let rowCount=0;
    // Use VENUES order
    const TEAM_KW=['水球','三人篮球','沙滩足球','沙滩手球','沙滩卡巴迪','龙舟','沙滩排球'];
    const isTeam=v=>(v.name||'').split('').some((_,i)=>TEAM_KW.some(k=>v.name.includes(k)));
    VENUES.forEach(venue=>{
      const vEvts=evts.filter(e=>e.venue_id===venue.id);
      if(!vEvts.length) return;
      // build lanes inline
      let lanes=[];
      try{
        let loc=venue.location||'';let defined=[];
        try{const j=JSON.parse(loc);if(j.loc!==undefined)defined=(j.courts||[]).filter(c=>c.on!==false);}catch(e){}
        if(defined.length>0){
          lanes=defined.map(c=>({label:c.n,evts:vEvts.filter(e=>{const m=((e.notes||'').match(/^\[场地:([^\]]*)\]/)||[]);return (m[1]||'').trim()===c.n;})}));
          const tagged=new Set(vEvts.filter(e=>/^\[场地:/.test(e.notes||'')).map(e=>e.id));
          const unt=vEvts.filter(e=>!tagged.has(e.id));
          if(unt.length) lanes.push({label:'其他',evts:unt});
          lanes=lanes.filter(ln=>ln.evts.length>0);
        } else {
          const sorted=vEvts.slice().sort((a,b)=>a.start_time-b.start_time);
          sorted.forEach(ev=>{
            let placed=false;
            for(let i=0;i<lanes.length;i++){if(!lanes[i].evts.some(le=>ev.start_time<le.end_time&&ev.end_time>le.start_time)){lanes[i].evts.push(ev);placed=true;break;}}
            if(!placed) lanes.push({label:'',evts:[ev]});
          });
          if(lanes.length>1) lanes.forEach((ln,i)=>{ln.label=`场地${i+1}`;});
        }
      }catch(e){lanes=[{label:'',evts:vEvts}];}
      lanes.forEach((lane,li)=>{
        const isFirst=li===0;
        const bg=rowCount%2===0?'#f8fafc':'#fff';
        const labelHtml=isFirst
          ?`<div class="vn">${venue.short_name||venue.name}</div>${lane.label?`<div class="vct" style="color:${venue.color}">${lane.label}</div>`:`<div class="vs">${venue.name}</div>`}`
          :`<div class="vct" style="color:${venue.color};padding-left:8px">${lane.label||'—'}</div>`;
        let blocks='';
        lane.evts.forEach(ev=>{
          const x=(ev.start_time-dayMs-startMin*60000)/(60000*60/pxPerHr);
          const w=Math.max((ev.end_time-ev.start_time)/(60000*60/pxPerHr),4);
          const stStr=`${p2(new Date(ev.start_time).getHours())}:${p2(new Date(ev.start_time).getMinutes())}`;
          const enStr=`${p2(new Date(ev.end_time).getHours())}:${p2(new Date(ev.end_time).getMinutes())}`;
          const team=TEAM_KW.some(k=>(venue.name||'').includes(k));
          const cueMin=team?-10:-5;
          const cueX=x+(cueMin*60000)/(60000*60/pxPerHr);
          const cueBar=isT?`<div style="position:absolute;left:${cueX}px;top:0;bottom:0;width:2px;background:#dc2626;z-index:3"></div>`:'';
          blocks+=`${cueBar}<div class="evb" style="left:${x}px;width:${w}px;background:${venue.color}" title="${ev.name} ${stStr}–${enStr}">
            <span class="evt">${ev.is_medal_event?'🥇 ':''}${ev.name}</span>
          </div>`;
        });
        rowsHtml+=`<div class="row" style="height:${rowH}px;background:${bg}">
          <div class="lbl" style="border-left:3px solid ${venue.color};background:${bg}">${labelHtml}</div>
          <div class="grid">${axisTicks}${blocks}</div>
        </div>`;
        rowCount++;
      });
    });
    return `<div class="pg">
      <header class="ph">
        <div class="ph-top">
          <div class="phi">🏖️</div>
          <div class="ph-txt"><div class="ph-main">第六届亚洲沙滩运动会</div><div class="ph-sub">The 6th Asian Beach Games · Sanya 2025</div></div>
          <div class="ph-rt"><div class="ph-type">${isT?'传 送 表':'赛 程 表'}</div><div class="ph-date">${dateStr} 周${DAYS[dt.getDay()]}</div></div>
        </div>
        <div class="ph-div"></div>
        <div class="ph-info"><span>导出时间：${nowStr}</span><span>第 ${pageIdx+1} 页 / 共 ${dateKeys.length} 页</span><span>本页赛事：${evts.length} 场</span>${isT?'<span style="color:#dc2626">● 红线 = 传送提示时间</span>':''}</div>
      </header>
      <div class="chart" style="min-width:${leftW+totalPx}px">${rowsHtml}</div>
      <footer class="pf"><span>第六届亚洲沙滩运动会 · Live-CUE 赛程管理系统</span><span>${dateStr} · 第 ${pageIdx+1} 页</span></footer>
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>${fileName}</title>

/* ── AUDIT ── */
async function renderAudit(){
  document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:var(--t3)">加载中…</div>';
  const {data}=await db.from('audit_logs').select('*').order('created_at',{ascending:false}).limit(50);
  LOGS=data||[];
  const icons={create:'＋',update:'✎',delete:'✕',import:'⇧',login:'◉'};
  document.getElementById('content').innerHTML=`
    <div class="section">
      <div class="sec-head"><span class="sec-title">操作日志</span><span class="sec-cnt">最近50条</span></div>
      ${LOGS.length?LOGS.map(l=>`
        <div class="log-row">
          <div class="log-icon ${l.action}">${icons[l.action]||'●'}</div>
          <div class="log-body">
            <div class="log-action">${l.summary||`${l.action} · ${l.table_name}`}</div>
            <div class="log-meta">${l.user_email||'system'} · ${fmtDT(new Date(l.created_at).getTime())}</div>
          </div>
        </div>`).join(''):'<div style="padding:30px;text-align:center;color:var(--t3)">暂无日志（需运行 SQL 脚本启用审计功能）</div>'}
    </div>`;
}

async function loadVenueMap(){
  if(VENUES.length) return;
  const {data}=await db.from('venues').select('*').order('name');
  VENUES=data||[];
}
async function logAction(action,table,summary){
  if(!CUR_USER) return;
  // Use service role key to bypass RLS for audit_logs (no INSERT policy needed)
  await fetch(`${SB_URL}/rest/v1/audit_logs`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_SVC,'Authorization':'Bearer '+SB_SVC},
    body:JSON.stringify({user_id:CUR_USER.id,user_email:CUR_USER.email,action,table_name:table,summary})
  }).catch(()=>{});
}
function statusBadge(s){
  const map={live:'<span class="badge live"><span class="dot live"></span>直播中</span>',scheduled:'<span class="badge sched">计划中</span>',finished:'<span class="badge done">已完成</span>',cancelled:'<span class="badge done">已取消</span>',completed:'<span class="badge done">已完成</span>'};
  return map[s]||`<span class="badge">${s}</span>`;
}
function fmtDT(ts){
  if(!ts) return '—';
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${p2(d.getHours())}:${p2(d.getMinutes())}`;
}
function p2(v){return String(v).padStart(2,'0');}
function toLocalDT(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}`;
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');}));
